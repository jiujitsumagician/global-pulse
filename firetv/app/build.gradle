plugins { id 'com.android.application' }
android {
  namespace 'io.dsio.globalpulse'
  compileSdk 34
  defaultConfig {
    applicationId 'io.dsio.globalpulse'
    minSdk 22
    targetSdk 34
    versionCode 1
    versionName '1.0'
  }
  signingConfigs {
    release {
      // Throwaway key: the Amazon Appstore strips this and re-signs with your
      // account's own key on submission. The .jks is gitignored.
      storeFile file('../globalpulse-release.jks')
      storePassword 'globalpulse'
      keyAlias 'globalpulse'
      keyPassword 'globalpulse'
    }
  }
  buildTypes { release { minifyEnabled false; signingConfig signingConfigs.release } }
  compileOptions { sourceCompatibility JavaVersion.VERSION_1_8; targetCompatibility JavaVersion.VERSION_1_8 }
}
dependencies { }
