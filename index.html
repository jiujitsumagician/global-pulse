<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Pulse — Live World Events</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#05070d;
    --panel:rgba(10,16,28,0.62);
    --line:rgba(120,170,210,0.18);
    --ink:#e8f2ff;
    --dim:#8aa2bf;
    --cyan:#5fe3ff;
    --amber:#ff9e3d;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ width:100%; height:100%; overflow:hidden; background:var(--bg); color:var(--ink);
    font-family:"Space Grotesk",system-ui,sans-serif; }
  #globe{ position:fixed; inset:0; }
  canvas{ display:block; }

  .mono{ font-family:"JetBrains Mono",monospace; }
  #hud{ position:fixed; inset:0; pointer-events:none; z-index:5; }

  /* brand */
  #brand{ position:absolute; top:22px; left:26px; }
  #brand .eye{ font-family:"JetBrains Mono",monospace; font-size:11px; letter-spacing:.4em;
    text-transform:uppercase; color:var(--dim); }
  #brand h1{ font-size:30px; font-weight:700; letter-spacing:.01em; margin-top:5px; line-height:1; }
  #brand h1 b{ color:var(--cyan); font-weight:700; }

  /* live status */
  #status{ position:absolute; top:24px; right:26px; text-align:right; font-family:"JetBrains Mono",monospace; }
  #status .live{ display:inline-flex; align-items:center; gap:8px; font-size:12px; letter-spacing:.2em;
    color:var(--ink); }
  #status .dot{ width:9px; height:9px; border-radius:50%; background:#43e08a; box-shadow:0 0 12px #43e08a;
    animation:pulse 1.6s infinite; }
  #status .sub{ font-size:11px; color:var(--dim); margin-top:6px; letter-spacing:.12em; }
  @keyframes pulse{ 0%,100%{ opacity:1; transform:scale(1);} 50%{ opacity:.35; transform:scale(.7);} }

  /* event feed */
  #feed{ position:absolute; top:90px; right:22px; width:330px; max-height:72vh; overflow:hidden;
    pointer-events:auto; display:flex; flex-direction:column; gap:9px; }
  #feed .head{ font-family:"JetBrains Mono",monospace; font-size:11px; letter-spacing:.3em; color:var(--dim);
    text-transform:uppercase; padding:0 4px 4px; }
  #feed .list{ display:flex; flex-direction:column; gap:9px; overflow-y:auto; padding-right:4px; }
  .card{ background:var(--panel); border:1px solid var(--line); border-left:3px solid var(--cyan);
    border-radius:9px; padding:10px 12px; cursor:pointer; backdrop-filter:blur(8px);
    transition:transform .12s, border-color .2s, background .2s; }
  .card:hover{ transform:translateX(-3px); background:rgba(16,24,40,0.8); }
  .card.on{ border-color:var(--cyan); background:rgba(18,30,50,0.86); box-shadow:0 0 22px rgba(95,227,255,.12); }
  .card .tag{ font-family:"JetBrains Mono",monospace; font-size:9.5px; letter-spacing:.18em; font-weight:700;
    text-transform:uppercase; }
  .card .ttl{ font-size:13.5px; line-height:1.32; margin:5px 0 6px; color:var(--ink);
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .card .meta{ font-family:"JetBrains Mono",monospace; font-size:10.5px; color:var(--dim);
    display:flex; justify-content:space-between; gap:8px; }
  .card .meta .pl{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

  /* focused-event popup */
  #popup{ position:absolute; left:26px; bottom:26px; width:380px; max-width:46vw; pointer-events:auto;
    background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:16px 18px;
    backdrop-filter:blur(10px); opacity:0; transform:translateY(14px); transition:opacity .35s, transform .35s;
    box-shadow:0 14px 50px rgba(0,0,0,.5); }
  #popup.show{ opacity:1; transform:none; }
  #popup .row{ display:flex; align-items:center; gap:10px; }
  #popup .tag{ font-family:"JetBrains Mono",monospace; font-size:10px; letter-spacing:.2em; font-weight:700;
    text-transform:uppercase; padding:3px 9px; border-radius:20px; border:1px solid currentColor; }
  #popup .when{ font-family:"JetBrains Mono",monospace; font-size:11px; color:var(--dim); margin-left:auto; }
  #popup h2{ font-size:19px; font-weight:600; line-height:1.25; margin:11px 0 9px; }
  #popup .loc{ font-family:"JetBrains Mono",monospace; font-size:12px; color:var(--cyan);
    display:flex; align-items:center; gap:8px; }
  #popup .loc svg{ width:13px; height:13px; }
  #popup .coords{ font-family:"JetBrains Mono",monospace; font-size:11px; color:var(--dim); margin-top:3px; }
  #popup a.read{ display:inline-flex; align-items:center; gap:8px; margin-top:14px; pointer-events:auto;
    font-family:"JetBrains Mono",monospace; font-size:12px; letter-spacing:.08em; text-decoration:none;
    color:var(--bg); background:var(--cyan); padding:9px 15px; border-radius:8px; font-weight:700;
    transition:transform .1s, box-shadow .2s; }
  #popup a.read:hover{ transform:translateY(-1px); box-shadow:0 8px 24px rgba(95,227,255,.3); }

  /* on-globe marker */
  .marker{ position:relative; width:12px; height:12px; transform:translate(-50%,-50%); cursor:pointer; }
  .marker .pin{ position:absolute; inset:0; border-radius:50%; background:var(--cyan);
    box-shadow:0 0 10px currentColor; color:var(--cyan); }
  .marker .halo{ position:absolute; inset:-5px; border-radius:50%; border:1.5px solid currentColor;
    color:var(--cyan); opacity:.5; animation:halo 2.4s infinite ease-out; }
  @keyframes halo{ 0%{ transform:scale(.5); opacity:.7;} 100%{ transform:scale(2.4); opacity:0;} }

  #foot{ position:absolute; left:26px; top:74px; font-family:"JetBrains Mono",monospace; font-size:10.5px;
    letter-spacing:.18em; color:var(--dim); }

  #toast{ position:absolute; left:50%; bottom:28px; transform:translateX(-50%);
    font-family:"JetBrains Mono",monospace; font-size:11px; letter-spacing:.15em; color:var(--dim);
    background:var(--panel); border:1px solid var(--line); border-radius:20px; padding:7px 16px; opacity:0;
    transition:opacity .3s; backdrop-filter:blur(8px); }
  #toast.show{ opacity:1; }

  @media (max-width:680px){
    #feed{ display:none; } #popup{ width:auto; left:14px; right:14px; max-width:none; bottom:14px; }
    #brand h1{ font-size:23px; }
  }
</style>
</head>
<body>
<div id="globe"></div>

<div id="hud">
  <div id="brand">
    <div class="eye">Realtime world monitor</div>
    <h1>GLOBAL <b>PULSE</b></h1>
  </div>
  <div id="foot">SOURCES · USGS SEISMIC · GDELT NEWS</div>

  <div id="status">
    <div class="live"><span class="dot"></span><span id="liveTxt">CONNECTING…</span></div>
    <div class="sub"><span id="evCount">0</span> EVENTS · UPD <span id="updClock">--:--</span></div>
  </div>

  <div id="feed">
    <div class="head">Live feed</div>
    <div class="list" id="feedList"></div>
  </div>

  <div id="popup">
    <div class="row">
      <span class="tag" id="pTag">EVENT</span>
      <span class="when" id="pWhen"></span>
    </div>
    <h2 id="pTitle">—</h2>
    <div class="loc"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s-7-5.5-7-11a7 7 0 1114 0c0 5.5-7 11-7 11z"/><circle cx="12" cy="10" r="2.5"/></svg><span id="pLoc"></span></div>
    <div class="coords" id="pCoords"></div>
    <a class="read" id="pLink" href="#" target="_blank" rel="noopener">Read more&nbsp;&rarr;</a>
  </div>

  <div id="toast"></div>
</div>

<script src="https://unpkg.com/globe.gl"></script>
<script>
(()=>{
"use strict";
const TYPES={
  Quake:{ color:'#ff9e3d', label:'Earthquake' },
  News: { color:'#5fe3ff', label:'World news' },
};
const $=id=>document.getElementById(id);

/* ---------------- globe ---------------- */
const world = Globe()(document.getElementById('globe'))
  .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
  .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
  .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png')
  .atmosphereColor('#5fb8ff').atmosphereAltitude(0.22)
  .width(innerWidth).height(innerHeight);

world.controls().autoRotate=true;
world.controls().autoRotateSpeed=0.45;
world.controls().enableDamping=true;
world.pointOfView({ lat:20, lng:0, altitude:2.5 });
addEventListener('resize',()=>{ world.width(innerWidth).height(innerHeight); });

// markers (HTML elements anchored to coordinates)
world.htmlElementsData([])
  .htmlLat(d=>d.lat).htmlLng(d=>d.lng).htmlAltitude(0.012)
  .htmlElement(d=>{
    const el=document.createElement('div'); el.className='marker'; el.style.color=TYPES[d.type].color;
    el.innerHTML='<div class="halo"></div><div class="pin"></div>';
    el.title=d.title;
    el.onclick=(e)=>{ e.stopPropagation(); focusEvent(d, true); };
    return el;
  });
// pulse rings on the focused event
world.ringColor(()=> t=>{ const c=current?TYPES[current.type].color:'#5fe3ff';
    return c + Math.round((1-t)*255).toString(16).padStart(2,'0'); })
  .ringMaxRadius(5).ringPropagationSpeed(2.2).ringRepeatPeriod(900)
  .ringsData([]);

/* ---------------- state ---------------- */
let events=[];                 // all known events (newest first)
const seen=new Set();
let focusQueue=[];             // new events waiting to be showcased
let current=null, resumeT=null, showcaseT=null;

/* ---------------- data sources ---------------- */
async function fetchQuakes(){
  try{
    const r=await fetch('https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/2.5_day.geojson',{cache:'no-store'});
    const j=await r.json();
    return j.features.map(f=>({
      id:'q:'+f.id, type:'Quake',
      lat:f.geometry.coordinates[1], lng:f.geometry.coordinates[0],
      title:'M'+(f.properties.mag??'?')+' earthquake — '+(f.properties.place||'unknown'),
      place:f.properties.place||'Unknown region', time:f.properties.time||Date.now(),
      url:f.properties.url, mag:f.properties.mag,
    }));
  }catch(e){ return []; }
}
function stripTags(h){ const d=document.createElement('div'); d.innerHTML=h||''; return (d.textContent||'').trim(); }
function firstLink(h){ const m=/href="([^"]+)"/i.exec(h||''); return m?m[1]:null; }
async function fetchNews(){
  // GDELT geo feed (geolocated headlines). No CORS on the API, so route via a public proxy; best-effort.
  try{
    const api='https://api.gdeltproject.org/api/v2/geo/geo?query=(breaking%20OR%20protest%20OR%20election%20OR%20conflict%20OR%20disaster)&format=GeoJSON&timespan=90min&maxrows=60';
    const url='https://api.allorigins.win/raw?url='+encodeURIComponent(api);
    const r=await fetch(url,{cache:'no-store'}); const j=await r.json();
    return (j.features||[]).filter(f=>f.geometry&&f.geometry.coordinates).map((f,i)=>{
      const p=f.properties||{}; const link=firstLink(p.html); const name=stripTags(p.html).slice(0,140)||p.name||'World news';
      return { id:'n:'+(p.name||'')+':'+i+':'+f.geometry.coordinates.join(','), type:'News',
        lat:f.geometry.coordinates[1], lng:f.geometry.coordinates[0],
        title:name, place:p.name||'Reported location', time:Date.now(), url:link };
    }).filter(e=>e.url);
  }catch(e){ return []; }
}

async function refresh(first){
  const [q,n]=await Promise.all([fetchQuakes(), fetchNews()]);
  const incoming=[...n, ...q].filter(e=>!seen.has(e.id));
  incoming.forEach(e=>seen.add(e.id));
  if(incoming.length){
    incoming.sort((a,b)=>b.time-a.time);
    events=[...incoming, ...events].slice(0,120);
    if(!first) focusQueue.unshift(...incoming.slice(0,6));   // showcase the freshest first
    renderMarkers(); renderFeed();
    if(!first) toast(incoming.length+' new event'+(incoming.length>1?'s':''));
  }
  $('liveTxt').textContent = events.length? 'LIVE' : 'NO DATA';
  $('evCount').textContent = events.length;
  $('updClock').textContent = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  if(first && events.length){ focusQueue=events.slice(0,5).reverse(); }
}

/* ---------------- render ---------------- */
function renderMarkers(){ world.htmlElementsData(events.slice(0,90)); }
function rel(t){ const s=(Date.now()-t)/1000; if(s<60)return Math.floor(s)+'s'; if(s<3600)return Math.floor(s/60)+'m';
  if(s<86400)return Math.floor(s/3600)+'h'; return Math.floor(s/86400)+'d'; }
function renderFeed(){
  const list=$('feedList'); list.innerHTML='';
  events.slice(0,30).forEach(ev=>{
    const c=TYPES[ev.type], el=document.createElement('div');
    el.className='card'+(current&&current.id===ev.id?' on':''); el.style.borderLeftColor=c.color;
    el.innerHTML=`<div class="tag" style="color:${c.color}">${c.label}</div>
      <div class="ttl">${escapeHtml(ev.title)}</div>
      <div class="meta"><span class="pl">${escapeHtml(ev.place)}</span><span>${rel(ev.time)} ago</span></div>`;
    el.onclick=()=>focusEvent(ev,true);
    el.dataset.id=ev.id; list.appendChild(el);
  });
}
function escapeHtml(s){ return (s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }

/* ---------------- focus / showcase ---------------- */
function focusEvent(ev, manual){
  if(!ev) return; current=ev;
  world.controls().autoRotate=false;
  world.pointOfView({ lat:ev.lat, lng:ev.lng, altitude:0.75 }, 1700);   // fly in + zoom
  world.ringsData([ev]);
  const c=TYPES[ev.type];
  const p=$('popup'); p.classList.add('show');
  const tag=$('pTag'); tag.textContent=c.label.toUpperCase(); tag.style.color=c.color;
  $('pWhen').textContent=rel(ev.time)+' ago';
  $('pTitle').textContent=ev.title;
  $('pLoc').textContent=ev.place;
  $('pCoords').textContent=ev.lat.toFixed(2)+'°, '+ev.lng.toFixed(2)+'°';
  const link=$('pLink'); link.href=ev.url||'#'; link.style.background=c.color;
  renderFeed();
  // scroll feed to the active card
  const card=document.querySelector('.card[data-id="'+CSS.escape(ev.id)+'"]'); if(card) card.scrollIntoView({block:'nearest'});
  clearTimeout(resumeT);
  if(!manual) resumeT=setTimeout(()=>{ world.controls().autoRotate=true; }, 6000);
}
function showcaseTick(){
  if(focusQueue.length){ focusEvent(focusQueue.shift(), false); }
  else if(events.length){ focusEvent(events[Math.floor(Math.random()*Math.min(events.length,15))], false); }
}
let toastT=null;
function toast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2600); }

/* ---------------- boot ---------------- */
refresh(true).then(()=>{
  if(events.length) setTimeout(()=>showcaseTick(), 1200);
});
showcaseT=setInterval(showcaseTick, 9000);   // showcase a location every 9s
setInterval(()=>refresh(false), 60000);      // poll for new events every minute
// keep relative times fresh
setInterval(renderFeed, 30000);

window.__GP={ get events(){return events;}, focusEvent, refresh };  // debug hook
})();
</script>
</body>
</html>
