<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- TV mode (?tv): lay out at a fixed 1920px width so a high-density TV WebView
     (e.g. Fire TV: 1920x1080 @ density 2 = 960 CSS px) renders like a 1080p desktop -->
<script>if(new URLSearchParams(location.search).has('tv')){var _m=document.querySelector('meta[name=viewport]');if(_m)_m.content='width=1920';}</script>
<title>Global Pulse — Live World Events</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#05070d">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#05070d; --panel:rgba(10,16,28,0.64); --line:rgba(120,170,210,0.18);
    --ink:#e8f2ff; --dim:#8aa2bf; --cyan:#5fe3ff; --scale:1;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ width:100%; height:100%; overflow:hidden; background:var(--bg); color:var(--ink);
    font-family:"Space Grotesk",system-ui,sans-serif; }
  body.idle{ cursor:none; }
  #globe{ position:fixed; inset:0; }
  canvas{ display:block; }
  .mono{ font-family:"JetBrains Mono",monospace; }

  /* HUD lives inside a TV-overscan-safe frame */
  #hud{ position:fixed; inset:0; pointer-events:none; z-index:5; }
  #safe{ position:absolute; inset:3.2%; }

  #brand{ position:absolute; top:0; left:0; }
  #brand .eye{ font-family:"JetBrains Mono",monospace; font-size:calc(11px*var(--scale)); letter-spacing:.4em;
    text-transform:uppercase; color:var(--dim); }
  #brand h1{ font-size:calc(30px*var(--scale)); font-weight:700; margin-top:5px; line-height:1; }
  #brand h1 b{ color:var(--cyan); }
  #foot{ position:absolute; left:0; top:calc(62px*var(--scale)); font-family:"JetBrains Mono",monospace;
    font-size:calc(10.5px*var(--scale)); letter-spacing:.18em; color:var(--dim); }

  #status{ position:absolute; top:0; right:0; text-align:right; font-family:"JetBrains Mono",monospace; }
  #status .live{ display:inline-flex; align-items:center; gap:8px; font-size:calc(12px*var(--scale)); letter-spacing:.2em; }
  #status .dot{ width:9px; height:9px; border-radius:50%; background:#43e08a; box-shadow:0 0 12px #43e08a; animation:blink 1.6s infinite; }
  #status .sub{ font-size:calc(11px*var(--scale)); color:var(--dim); margin-top:6px; letter-spacing:.12em; }
  @keyframes blink{ 0%,100%{ opacity:1;} 50%{ opacity:.3;} }

  #feed{ position:absolute; top:calc(86px*var(--scale)); right:0; width:calc(330px*var(--scale)); max-height:70%;
    display:flex; flex-direction:column; gap:9px; pointer-events:auto; }
  #feed .head{ font-family:"JetBrains Mono",monospace; font-size:calc(11px*var(--scale)); letter-spacing:.3em;
    color:var(--dim); text-transform:uppercase; padding:0 4px 4px; }
  #feed .list{ display:flex; flex-direction:column; gap:9px; overflow:hidden; }
  .card{ background:var(--panel); border:1px solid var(--line); border-left:3px solid var(--cyan); border-radius:9px;
    padding:10px 12px; cursor:pointer; backdrop-filter:blur(8px); transition:transform .12s, border-color .2s, background .2s; }
  .card:hover{ transform:translateX(-3px); }
  .card.on{ border-color:var(--cyan); background:rgba(20,32,52,0.9); box-shadow:0 0 0 1px var(--cyan), 0 0 26px rgba(95,227,255,.18); transform:translateX(-3px); }
  .card .tag{ font-family:"JetBrains Mono",monospace; font-size:calc(9.5px*var(--scale)); letter-spacing:.18em; font-weight:700; text-transform:uppercase; }
  .card .ttl{ font-size:calc(13.5px*var(--scale)); line-height:1.32; margin:5px 0 6px;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .card .meta{ font-family:"JetBrains Mono",monospace; font-size:calc(10.5px*var(--scale)); color:var(--dim);
    display:flex; justify-content:space-between; gap:8px; }
  .card .meta .pl{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:62%; }

  /* left detail panel — image + blurb + nearby coverage */
  #detail{ position:absolute; left:0; top:calc(86px*var(--scale)); bottom:calc(40px*var(--scale));
    width:calc(420px*var(--scale)); max-width:42vw; pointer-events:auto; display:flex; flex-direction:column;
    background:var(--panel); border:1px solid var(--line); border-radius:16px; overflow:hidden; backdrop-filter:blur(12px);
    opacity:0; transform:translateX(-16px); transition:opacity .4s, transform .4s; box-shadow:0 18px 60px rgba(0,0,0,.55); }
  #detail.show{ opacity:1; transform:none; }
  .dhero{ position:relative; height:calc(190px*var(--scale)); flex:none; background:#0b121e; overflow:hidden; }
  .dhero img{ width:100%; height:100%; object-fit:cover; display:block; opacity:0; transition:opacity .5s; }
  .dhero img.on{ opacity:1; }
  .dgrad{ position:absolute; inset:0; background:linear-gradient(180deg, rgba(5,7,13,.1) 30%, rgba(10,16,28,.95)); }
  .dtagrow{ position:absolute; left:16px; right:16px; bottom:12px; display:flex; align-items:center; gap:10px; }
  .dtag{ font-family:"JetBrains Mono",monospace; font-size:calc(10px*var(--scale)); letter-spacing:.2em; font-weight:700;
    text-transform:uppercase; padding:4px 10px; border-radius:20px; border:1px solid currentColor; background:rgba(5,7,13,.5); }
  .dwhen{ font-family:"JetBrains Mono",monospace; font-size:calc(11px*var(--scale)); color:var(--dim); margin-left:auto; }
  .dscroll{ flex:1; overflow:hidden; padding:16px 18px 8px; }
  #detail h2{ font-size:calc(20px*var(--scale)); font-weight:600; line-height:1.25; margin-bottom:10px; }
  .dmeta{ display:flex; flex-direction:column; gap:3px; margin-bottom:12px; font-family:"JetBrains Mono",monospace; }
  .dmeta .dloc{ font-size:calc(12.5px*var(--scale)); color:var(--cyan); }
  .dmeta .dsub{ font-size:calc(11px*var(--scale)); color:var(--dim); }
  .dblurb{ font-size:calc(13.5px*var(--scale)); line-height:1.55; color:#cdd9ea; }
  .dblurb p{ margin-bottom:9px; }
  .dblurb .skel{ height:11px; background:linear-gradient(90deg,rgba(120,170,210,.10),rgba(120,170,210,.20),rgba(120,170,210,.10));
    background-size:200% 100%; border-radius:4px; margin-bottom:9px; animation:shim 1.4s infinite; }
  @keyframes shim{ 0%{ background-position:200% 0;} 100%{ background-position:-200% 0;} }
  .drelhead{ font-family:"JetBrains Mono",monospace; font-size:calc(10px*var(--scale)); letter-spacing:.24em; color:var(--dim);
    text-transform:uppercase; margin:14px 0 8px; }
  .drelated{ display:flex; flex-direction:column; gap:7px; }
  .drel{ display:flex; gap:9px; align-items:center; cursor:pointer; border-radius:8px; padding:5px; transition:background .15s; }
  .drel:hover{ background:rgba(120,170,210,.1); }
  .drel img{ width:46px; height:36px; object-fit:cover; border-radius:5px; flex:none; background:#0b121e; }
  .drel .rt{ font-size:calc(11.5px*var(--scale)); line-height:1.25; color:#bcccde;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .dfoot{ flex:none; display:flex; align-items:center; justify-content:space-between; gap:12px; padding:12px 18px;
    border-top:1px solid var(--line); background:rgba(5,7,13,.4); }
  .dok{ font-family:"JetBrains Mono",monospace; font-size:calc(12px*var(--scale)); color:var(--ink); }
  .dok b{ background:var(--cyan); color:var(--bg); border-radius:5px; padding:2px 9px; font-weight:700; margin-right:6px; }
  .dqr{ width:calc(52px*var(--scale)); height:calc(52px*var(--scale)); border-radius:6px; background:#fff; padding:3px; }

  /* on-globe markers */
  .marker{ position:relative; width:12px; height:12px; transform:translate(-50%,-50%); pointer-events:auto; cursor:pointer; }
  .marker .pin{ position:absolute; inset:0; border-radius:50%; background:currentColor; box-shadow:0 0 10px currentColor; }
  .marker .halo{ position:absolute; inset:-5px; border-radius:50%; border:1.5px solid currentColor; opacity:.5; animation:halo 2.4s infinite ease-out; }
  @keyframes halo{ 0%{ transform:scale(.5); opacity:.7;} 100%{ transform:scale(2.4); opacity:0;} }

  /* in-app reader */
  #reader{ position:fixed; inset:0; z-index:20; background:rgba(4,7,14,0.96); display:flex; opacity:0; pointer-events:none;
    transition:opacity .3s; }
  #reader.show{ opacity:1; pointer-events:auto; }
  #readerHost{ flex:1; position:relative; background:#0b0f17; }
  #readerHost iframe, #readerHost webview{ position:absolute; inset:0; width:100%; height:100%; border:0; background:#fff; }
  #readerSide{ width:300px; flex:none; border-left:1px solid var(--line); padding:24px 22px; display:flex; flex-direction:column; gap:16px; background:#070b13; }
  #readerSide .tag{ font-family:"JetBrains Mono",monospace; font-size:11px; letter-spacing:.2em; color:var(--cyan); }
  #readerSide h3{ font-size:16px; line-height:1.32; font-weight:600; }
  #readerSide .qr{ background:#fff; padding:10px; border-radius:10px; align-self:flex-start; }
  #readerSide .qr img{ display:block; width:200px; height:200px; }
  #readerSide .url{ font-family:"JetBrains Mono",monospace; font-size:11px; color:var(--dim); word-break:break-all; }
  #readerSide .hint{ margin-top:auto; font-family:"JetBrains Mono",monospace; font-size:12px; color:var(--dim); line-height:1.7; }
  #readerSide .hint b{ color:var(--ink); background:rgba(120,170,210,.14); border:1px solid var(--line); border-radius:5px; padding:1px 8px; }

  #toast{ position:absolute; left:50%; bottom:0; transform:translateX(-50%); font-family:"JetBrains Mono",monospace;
    font-size:calc(11px*var(--scale)); letter-spacing:.15em; color:var(--dim); background:var(--panel); border:1px solid var(--line);
    border-radius:20px; padding:7px 16px; opacity:0; transition:opacity .3s; backdrop-filter:blur(8px); }
  #toast.show{ opacity:1; }

  @media (max-width:680px){ #feed{ display:none; } #detail{ width:auto; left:0; right:0; max-width:none; top:auto; height:55%; } #readerSide{ display:none; } }
</style>
</head>
<body>
<div id="globe"></div>

<div id="hud"><div id="safe">
  <div id="brand">
    <div class="eye">Realtime world monitor</div>
    <h1>GLOBAL <b>PULSE</b></h1>
  </div>
  <div id="foot">SOURCES · GDELT NEWS · USGS SEISMIC · NASA EONET · SPACEFLIGHT</div>

  <div id="status">
    <div class="live"><span class="dot"></span><span id="liveTxt">CONNECTING…</span></div>
    <div class="sub"><span id="evCount">0</span> EVENTS · UPD <span id="updClock">--:--</span></div>
  </div>

  <div id="feed">
    <div class="head">Live feed &nbsp;·&nbsp; ↑↓ navigate</div>
    <div class="list" id="feedList"></div>
  </div>

  <div id="detail">
    <div class="dhero" id="dHero"><img id="dImg" alt=""><div class="dgrad"></div>
      <div class="dtagrow"><span class="dtag" id="dTag">EVENT</span><span class="dwhen" id="dWhen"></span></div>
    </div>
    <div class="dscroll">
      <h2 id="dTitle">—</h2>
      <div class="dmeta">
        <span class="dloc" id="dLoc"></span>
        <span class="dsub" id="dCoords"></span>
        <span class="dsub" id="dSrc"></span>
      </div>
      <div class="dblurb" id="dBlurb"></div>
      <div class="drelhead" id="dRelHead" style="display:none">More coverage nearby</div>
      <div class="drelated" id="dRelated"></div>
    </div>
    <div class="dfoot">
      <span class="dok"><b>OK</b> read full article</span>
      <img class="dqr" id="dQr" alt="">
    </div>
  </div>

  <div id="toast"></div>
</div></div>

<div id="reader">
  <div id="readerHost"></div>
  <div id="readerSide">
    <div class="tag" id="rTag">ARTICLE</div>
    <h3 id="readerTitle">—</h3>
    <div class="qr"><img id="qrImg" alt="Scan to open on your phone"></div>
    <div class="url" id="readerUrl"></div>
    <div class="hint"><b>↑ ↓</b> scroll &nbsp; <b>BACK</b> return to globe<br><span style="opacity:.7">Scan the QR to open on your phone</span></div>
  </div>
</div>

<script src="https://unpkg.com/globe.gl"></script>
<script>
(()=>{
"use strict";
const API = (location.protocol==='file:') ? 'https://global-pulse-two.vercel.app' : '';
const isTV = new URLSearchParams(location.search).has('tv');
const TVSCALE = Math.min(2.0, Math.max(1, Math.min(innerWidth,innerHeight)/620));
document.documentElement.style.setProperty('--scale', TVSCALE);

const CATS={
  Conflict:{c:'#ff5a4d', label:'Conflict'}, Politics:{c:'#b98cff', label:'Politics'},
  Disaster:{c:'#ff9e3d', label:'Disaster'}, News:{c:'#5fe3ff', label:'World news'},
  Quake:{c:'#ffd23d', label:'Earthquake'}, Nature:{c:'#5ce0a0', label:'Natural event'},
  Space:{c:'#8aa6ff', label:'Spaceflight'},
};
const DWELL=90000;   // hold ~1.5 min on each location
const cat=e=>CATS[e&&e.category]||CATS.News;
const $=id=>document.getElementById(id);

/* ---------------- globe ---------------- */
// Same-origin earth texture (cross-origin unpkg textures are CORS-tainted -> black
// globe in the Fire TV WebView). On TV, also drop bump/night-sky + cap pixelRatio
// to keep the weaker GPU smooth.
const world = Globe()(document.getElementById('globe'))
  .globeImageUrl('earth.jpg')
  .atmosphereColor('#5fb8ff').atmosphereAltitude(isTV?0.18:0.22)
  .width(innerWidth).height(innerHeight);
if(!isTV){ world
  .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
  .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png'); }
if(isTV){ try{ world.renderer().setPixelRatio(1); }catch(e){} }
world.controls().autoRotate=true; world.controls().autoRotateSpeed=0.42; world.controls().enableDamping=true;
world.pointOfView({lat:20,lng:0,altitude:2.5});
addEventListener('resize',()=>world.width(innerWidth).height(innerHeight));

world.htmlElementsData([]).htmlLat(d=>d.lat).htmlLng(d=>d.lng).htmlAltitude(0.012)
  .htmlElement(d=>{ const el=document.createElement('div'); el.className='marker'; el.style.color=cat(d).c;
    el.innerHTML='<div class="halo"></div><div class="pin"></div>'; el.title=d.title;
    el.onclick=e=>{ e.stopPropagation(); focusId(d.id,true); }; return el; });
world.ringColor(()=> t=>{ const c=current?cat(current).c:'#5fe3ff'; return c+Math.round((1-t)*255).toString(16).padStart(2,'0'); })
  .ringMaxRadius(5).ringPropagationSpeed(2.2).ringRepeatPeriod(900).ringsData([]);

/* ---------------- state ---------------- */
let events=[]; const seen=new Set(); let current=null, cur=-1; let playlist=[];
let paused=false, pauseT=null, resumeT=null, readerOpen=false, detailSeq=0;

/* ---------------- data ---------------- */
async function getEvents(){
  try{ const r=await fetch(API+'/api/events',{cache:'no-store'}); if(r.ok){ const j=await r.json(); if(j.events&&j.events.length) return j.events; } }catch(e){}
  const [q,n]=await Promise.all([fbQuakes(),fbNews()]); return [...n,...q];   // file:// / no-backend fallback
}
async function fbQuakes(){ try{ const j=await (await fetch('https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/2.5_day.geojson')).json();
  return j.features.map(f=>({id:'q:'+f.id,type:'Quake',category:'Quake',lat:f.geometry.coordinates[1],lng:f.geometry.coordinates[0],
    title:`M${f.properties.mag} earthquake — ${f.properties.place||'unknown'}`,place:f.properties.place||'Unknown',time:f.properties.time,url:f.properties.url,source:'usgs.gov'})); }catch(e){ return []; } }
async function fbNews(){ try{
  const api='https://api.gdeltproject.org/api/v2/doc/doc?query='+encodeURIComponent('(breaking OR war OR election OR protest OR summit) sourcelang:english')+'&mode=ArtList&format=json&maxrecords=40&timespan=120min&sort=DateDesc';
  const j=await (await fetch('https://api.allorigins.win/raw?url='+encodeURIComponent(api))).json();
  return (j.articles||[]).filter(a=>a.title&&a.url).map(a=>({id:'n:'+a.url,type:'News',category:'News',
    lat:20+(Math.random()*120-60),lng:(Math.random()*360-180),title:a.title,place:a.sourcecountry||'World',time:Date.now(),url:a.url,source:a.domain||''}));
  }catch(e){ return []; } }

async function refresh(first){
  const incoming=(await getEvents()).filter(e=>e&&Number.isFinite(e.lat)&&!seen.has(e.id));
  incoming.forEach(e=>seen.add(e.id));
  if(incoming.length){
    incoming.sort((a,b)=>b.time-a.time);
    events=[...incoming,...events].slice(0,160);
    buildPlaylist(); renderMarkers(); renderFeed();
    if(!first){ cur=-1; toast(incoming.length+' new event'+(incoming.length>1?'s':'')); }
  }
  $('liveTxt').textContent=events.length?'LIVE':'NO DATA';
  $('evCount').textContent=events.length;
  $('updClock').textContent=new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  if(first&&playlist.length){ cur=0; focus(playlist[0],false); }
}

/* ---------------- render ---------------- */
function renderMarkers(){ world.htmlElementsData(events.slice(0,100)); }
function rel(t){ const s=(Date.now()-t)/1000; if(s<60)return Math.max(1,Math.floor(s))+'s'; if(s<3600)return Math.floor(s/60)+'m'; if(s<86400)return Math.floor(s/3600)+'h'; return Math.floor(s/86400)+'d'; }
function esc(s){ return (s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }
function renderFeed(){
  const list=$('feedList'); list.innerHTML='';
  (playlist.length?playlist:events).slice(0,24).forEach((ev,i)=>{ const c=cat(ev), el=document.createElement('div');
    el.className='card'+(current&&current.id===ev.id?' on':''); el.style.borderLeftColor=c.c; el.dataset.id=ev.id;
    el.innerHTML=`<div class="tag" style="color:${c.c}">${c.label}</div><div class="ttl">${esc(ev.title)}</div>
      <div class="meta"><span class="pl">${esc(ev.place)}</span><span>${rel(ev.time)} ago</span></div>`;
    el.onclick=()=>focusId(ev.id,true); list.appendChild(el); });
}

/* ---------------- playlist (interleave by type so it mixes it up) ---------------- */
function buildPlaylist(){
  const groups={}; for(const e of events.slice(0,140)){ (groups[e.category]=groups[e.category]||[]).push(e); }
  for(const k in groups){ groups[k].sort((a,b)=>b.time-a.time); groups[k]=groups[k].slice(0,14); }  // cap per type so none dominates
  const keys=Object.keys(groups), idx={}; keys.forEach(k=>idx[k]=0);
  const out=[]; let last=null, guard=0, total=Object.values(groups).reduce((s,g)=>s+g.length,0);
  while(out.length<total && guard++<3000){
    let best=null, bestRem=-1;                         // pick a category != last with the most remaining
    for(const k of keys){ if(k===last) continue; const rem=groups[k].length-idx[k]; if(rem>bestRem){ bestRem=rem; best=k; } }
    if(!best || bestRem<=0){ for(const k of keys){ if(idx[k]<groups[k].length){ best=k; break; } } }
    if(!best) break; out.push(groups[best][idx[best]++]); last=best;
  }
  playlist=out;
}

/* ---------------- focus + detail panel ---------------- */
function focus(ev,manual){ if(!ev) return; current=ev;
  const i=playlist.findIndex(e=>e&&e.id===ev.id); if(i>=0) cur=i;
  world.controls().autoRotate=false;
  world.pointOfView({lat:ev.lat,lng:ev.lng,altitude:isTV?1.05:0.78},1600);
  world.ringsData([ev]);
  renderDetail(ev);
  renderFeed(); const card=document.querySelector('.card[data-id="'+CSS.escape(ev.id)+'"]'); if(card) card.scrollIntoView({block:'nearest'});
  clearTimeout(resumeT); if(manual) pause();
}
function focusId(id,manual){ const ev=events.find(e=>e.id===id); if(ev) focus(ev,manual); }
function pause(){ paused=true; clearTimeout(pauseT); pauseT=setTimeout(()=>paused=false,45000); }
function tick(){ if(paused||readerOpen||!playlist.length) return; cur=(cur+1)%playlist.length; focus(playlist[cur],false); }

function renderDetail(ev){
  const c=cat(ev); $('detail').classList.add('show');
  const tag=$('dTag'); tag.textContent=c.label.toUpperCase(); tag.style.color=c.c; tag.style.borderColor=c.c;
  $('dWhen').textContent=rel(ev.time)+' ago';
  $('dTitle').textContent=ev.title;
  $('dLoc').textContent='◉ '+ev.place;
  $('dCoords').textContent=ev.lat.toFixed(2)+'°, '+ev.lng.toFixed(2)+'°';
  $('dSrc').textContent=(ev.source||'').toUpperCase();
  const img=$('dImg'); img.classList.remove('on');
  if(ev.image){ $('dHero').style.display=''; img.onload=()=>img.classList.add('on'); img.onerror=()=>{ $('dHero').style.display='none'; }; img.src=ev.image; }
  else { $('dHero').style.display='none'; img.removeAttribute('src'); }
  $('dQr').src='https://api.qrserver.com/v1/create-qr-code/?size=130x130&margin=0&data='+encodeURIComponent(ev.url||'');
  $('dBlurb').innerHTML='<div class="skel" style="width:96%"></div><div class="skel" style="width:88%"></div><div class="skel" style="width:64%"></div>';
  renderRelated(ev);
  loadDetail(ev);
}
async function loadDetail(ev){
  const seq=++detailSeq; let info=null;
  if(ev.url && /^https?:/.test(ev.url) && (ev.type==='News')){
    try{ const r=await fetch(API+'/api/article?url='+encodeURIComponent(ev.url)); if(r.ok) info=await r.json(); }catch(e){}
  }
  if(seq!==detailSeq) return;          // a newer focus superseded this
  const paras=(info&&info.paragraphs&&info.paragraphs.length)? info.paragraphs : fallbackBlurb(ev);
  $('dBlurb').innerHTML=paras.slice(0,3).map(p=>'<p>'+esc(p)+'</p>').join('');
  if(!ev.image && info && info.images && info.images[0]){ $('dHero').style.display=''; const img=$('dImg'); img.onload=()=>img.classList.add('on'); img.src=info.images[0]; }
}
function fallbackBlurb(ev){
  if(ev.category==='Quake') return ['A magnitude '+(ev.mag||'?')+' earthquake was recorded near '+ev.place+'.',
    'Seismic data is provided live by the USGS. Press OK for the full event report — depth, intensity and any aftershocks.'];
  if(ev.type==='Space') return [ev.title+' — a launch staged from '+ev.place+'.',
    'Tracked via The Space Devs launch database. Press OK for mission details and live coverage.'];
  if(ev.type==='Nature') return [ev.title+' is an active natural event ('+ev.place+'), tracked by NASA EONET.',
    'Press OK for the latest source reports and satellite imagery.'];
  if(ev.type==='Weather') return [ev.title+'.',
    'An active severe-weather alert for '+ev.place+', issued by the US National Weather Service. Press OK for the full advisory.'];
  return [ev.title+'.', 'Reported via '+(ev.source||'wire services')+' from '+ev.place+'. Press OK to open the full article in the reader.'];
}
function renderRelated(ev){
  const near=events.filter(e=>e.id!==ev.id && Math.abs(e.lat-ev.lat)<6 && Math.abs(((e.lng-ev.lng+540)%360)-180)<8).slice(0,3);
  const box=$('dRelated'), head=$('dRelHead');
  if(!near.length){ box.innerHTML=''; head.style.display='none'; return; }
  head.style.display='block';
  box.innerHTML=near.map(e=>{ const cc=cat(e);
    const im=e.image? '<img src="'+esc(e.image)+'">' : '';
    return '<div class="drel" data-id="'+esc(e.id)+'">'+im+'<div class="rt" style="border-left:2px solid '+cc.c+';padding-left:7px">'+esc(e.title)+'</div></div>';
  }).join('');
  box.querySelectorAll('.drel').forEach(el=>el.onclick=()=>focusId(el.dataset.id,true));
}

/* ---------------- in-app reader ---------------- */
let _frame=null;
function openReader(){ const ev=current; if(!ev||!ev.url) return;
  if(window.GPNative&&window.GPNative.openArticle){ window.GPNative.openArticle(ev.url); return; }  // Fire TV / native wrapper
  const host=$('readerHost'); host.innerHTML='';
  const useWV=!!window.GPElectron;                                   // Electron embedded browser
  _frame=document.createElement(useWV?'webview':'iframe'); _frame.setAttribute('src',ev.url);
  if(!useWV){ _frame.setAttribute('referrerpolicy','no-referrer'); _frame.setAttribute('sandbox','allow-scripts allow-same-origin allow-popups'); }
  host.appendChild(_frame);
  const c=cat(ev); const rt=$('rTag'); rt.textContent=c.label.toUpperCase(); rt.style.color=c.c;
  $('readerTitle').textContent=ev.title; $('readerUrl').textContent=ev.url;
  $('qrImg').src='https://api.qrserver.com/v1/create-qr-code/?size=240x240&margin=0&data='+encodeURIComponent(ev.url);
  $('reader').classList.add('show'); readerOpen=true; world.controls().autoRotate=false;
}
function closeReader(){ $('reader').classList.remove('show'); readerOpen=false; $('readerHost').innerHTML=''; _frame=null; pause(); }
function scrollReader(dy){ if(!_frame) return; try{
  if(_frame.tagName==='WEBVIEW'&&_frame.executeJavaScript){ _frame.executeJavaScript('scrollBy(0,'+dy+')'); }
  else if(_frame.contentWindow){ _frame.contentWindow.scrollBy(0,dy); }
}catch(e){} }
window.gpOnBack=()=>{ if(readerOpen){ closeReader(); return true; } return false; };  // hardware back hook

/* ---------------- remote / keyboard ---------------- */
addEventListener('keydown',e=>{
  const k=e.key;
  if(readerOpen){
    if(k==='ArrowUp'){ e.preventDefault(); scrollReader(-140); }
    else if(k==='ArrowDown'){ e.preventDefault(); scrollReader(140); }
    else if(k==='PageUp'){ scrollReader(-700); } else if(k==='PageDown'){ scrollReader(700); }
    else if(k==='Escape'||k==='Backspace'||k==='GoBack'||k==='BrowserBack'){ e.preventDefault(); closeReader(); }
    return;
  }
  if(k==='ArrowDown'||k==='ArrowRight'){ e.preventDefault(); if(playlist.length){ cur=(cur+1)%playlist.length; focus(playlist[cur],true); } }
  else if(k==='ArrowUp'||k==='ArrowLeft'){ e.preventDefault(); if(playlist.length){ cur=(cur-1+playlist.length)%playlist.length; focus(playlist[cur],true); } }
  else if(k==='Enter'||k===' '){ e.preventDefault(); openReader(); }
  else if(k==='Escape'){ if(window.GPElectron&&window.GPElectron.quit) window.GPElectron.quit(); }  // exit screensaver (Windows)
  else if(k==='f'||k==='F'){ toggleFullscreen(); }
});

/* ---------------- ambient / screensaver niceties ---------------- */
let idleT=null; function bumpIdle(){ document.body.classList.remove('idle'); clearTimeout(idleT); idleT=setTimeout(()=>document.body.classList.add('idle'),3500); }
['mousemove','mousedown','touchstart'].forEach(ev=>addEventListener(ev,bumpIdle)); bumpIdle();
function toggleFullscreen(){ try{ if(!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }catch(e){} }
addEventListener('click',()=>{ if(!document.fullscreenElement && !window.GPNative && !window.GPElectron){ /* user gesture: allow fullscreen via F */ } });
let toastT=null; function toast(m){ const t=$('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2600); }

/* ---------------- boot ---------------- */
refresh(true);
setInterval(tick, DWELL);         // hold on each location for DWELL ms, then move on
setInterval(()=>refresh(false), 90000);  // poll for new events
setInterval(renderFeed, 30000);   // keep relative times fresh

window.__GP={ get events(){return events;}, get playlist(){return playlist;}, buildPlaylist, focus, focusId, openReader, closeReader };
})();
</script>
